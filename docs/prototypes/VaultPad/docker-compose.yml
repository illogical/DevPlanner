services:
  markdown-web:
    build: .
    container_name: agentvault-serve-web
    restart: unless-stopped
    environment:
      PORT: 17104
      HOST: 0.0.0.0
      VAULT_ROOT: /vault
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:17104}
    volumes:
      - ../:/vault
    networks: [tailnet]

  tailscale:
    image: tailscale/tailscale:stable
    container_name: agentvault-serve-tailscale
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
      - ./serve.json:/config/serve.json:ro
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      TS_SERVE_CONFIG: /config/serve.json
    networks: [tailnet]
    depends_on: [markdown-web]

volumes:
  tailscale-state:

networks:
  tailnet:
    driver: bridge
