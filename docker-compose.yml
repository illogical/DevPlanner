# =============================================================================
# DevPlanner — Docker Compose
# =============================================================================
# Quick-start:
#   1. cp .env.example .env
#   2. Edit .env — set DEVPLANNER_WORKSPACE to the absolute path of your
#      workspace directory on the host machine (it will be bind-mounted into
#      the container at /workspace).
#   3. docker compose up --build
#
# Everything runs on a single port (17103): the Elysia backend serves both the
# REST API/WebSocket and the pre-built React frontend as static files.
#
# For Tailscale / local-network access, replace "localhost" with the machine's
# Tailscale IP or hostname. The port is bound to all interfaces (0.0.0.0) so
# it is reachable on your local network and via Tailscale without any
# additional configuration.
# =============================================================================

services:
  devplanner:
    build: .
    ports:
      # HOST:CONTAINER — change the left side to remap the port on the host
      - "${PORT:-17103}:17103"   # API + WebSocket + Frontend (single port)
    volumes:
      # Mount the host workspace directory into the container.
      # DEVPLANNER_WORKSPACE in .env must be an absolute path on the host.
      - "${DEVPLANNER_WORKSPACE:-./workspace}:/workspace"
    environment:
      # Inside the container the workspace is always at /workspace
      DEVPLANNER_WORKSPACE: /workspace
      PORT: "17103"
      NODE_ENV: production
      DISABLE_FILE_WATCHER: "${DISABLE_FILE_WATCHER:-false}"
    restart: unless-stopped

  mcp-gateway:
    build: .
    command: ["bunx", "supergateway", "--stdio", "bun src/mcp-server.ts", "--port", "17104", "--outputTransport", "streamableHttp", "--logLevel", "info"]
    ports:
      - "17104:17104"
    volumes:
      - "${DEVPLANNER_WORKSPACE:-./workspace}:/workspace"
    environment:
      DEVPLANNER_WORKSPACE: /workspace
      NODE_ENV: production
      ARTIFACT_BASE_URL: "${ARTIFACT_BASE_URL:-}"
      ARTIFACT_BASE_PATH: "${ARTIFACT_BASE_PATH:-}"
    restart: unless-stopped
